@if (!memberService.editMode()) {
@if (photos(); as photos) {
@if (photos.length > 0) {
<div class="grid grid-cols-4 auto-rows-min gap-3 p-5 h-[65vh] overflow-auto">
    @for (photo of photos; track photo.id) {
    <div class="relative">
        <img src="{{photo.url}}" alt="photot of member" class="w-full rounded-lg">
        <app-favourite-button [isDisabled]="isMainPhoto(photo)" [isSelected]="isMainPhoto(photo)" (isClicked)="setMainPhoto(photo)"/>
    </div>

    }
</div>
} @else {
<p class="text-center text-gray-500">No photos available</p>
}
}
} @else {
<app-image-upload (uploadFile)="onUploadImage($event)" [loading]="loading()" />
}
