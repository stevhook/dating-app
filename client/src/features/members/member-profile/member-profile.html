@if (member(); as member) {
    <div class="flex flex-col gap-3">
        <div class="flex gap-3">
            <span class="font-semibold">Member since:</span>
            <span>{{member.created | date: 'dd MMMM yyyy'}}</span>
        </div>
        <div class="flex gap-3">
            <span class="font-semibold">Last active:</span>
            <span>{{member.lastActive | date: 'dd MMMM yyyy h:mm a'}}</span>
        </div>
        <h3 class="text-lg font-semibold text-primary">About</h3>
        @if (memberService.editMode()) {
            <div>
                Profile form goes here
            </div>
        } @else {
        <div>{{member.description}}</div>
        }
    </div>
}
